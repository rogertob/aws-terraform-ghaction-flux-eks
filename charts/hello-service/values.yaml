replicaCount: 1


image:
  repository: ghcr.io/rogertob/hello-service
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
#  - name: ghcr-pull-secret

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

startupProbe:
  httpGet:
    path: /health
    port: http
  failureThreshold: 30
  periodSeconds: 5

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

#desiredReplicas = ceil( currentReplicas × (current% / target%) )
#                = ceil( 2 × (4 / 80) )
#                = ceil( 0.1 )
#                = 1


podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Spread across nodes and schedule if not satisfied 
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
