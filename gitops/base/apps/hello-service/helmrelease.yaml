apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hello-service
  namespace: api
spec:
  interval: 10m
  chart:
    spec:
      chart: hello-service
      # Flux will upgrade automatically when a new chart version is pushed
      version: ">=0.1.0-0"
      sourceRef:
        kind: HelmRepository
        name: hello-service
        namespace: flux-system
  values:
    replicaCount: 1
    image:
      repository: ghcr.io/rogertob/hello-service
      tag: latest
