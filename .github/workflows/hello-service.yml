name: hello-service

on:
  push:
    branches: [main]
    paths:
      - "apps/hello-service/**"
      - "charts/hello-service/**"
  pull_request:
    paths:
      - "apps/hello-service/**"
      - "charts/hello-service/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/hello-service
  CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: apps/hello-service
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Install Helm
      #   if: github.event_name != 'pull_request'
      #   uses: azure/setup-helm@v4

      # - name: Package and push Helm chart
      #   if: github.event_name != 'pull_request'
      #   run: |
      #     CHART_VERSION="0.1.0-$(git rev-parse --short HEAD)"
      #     helm package charts/hello-service --version "$CHART_VERSION"
      #     helm push hello-service-*.tgz ${{ env.CHART_REGISTRY }}
